<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Your Objective</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 120px; margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: none; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #cccccc; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #333; text-align: center;">Draft Your Objective</h2>
        <p style="font-size: 14px; color: #666;">Submit one specific, measurable objective for your protocol. It will be reviewed anonymously.</p>
        <form id="objectiveForm">
            <textarea id="objectiveText" placeholder="e.g., To estimate the prevalence of..." required></textarea>
            <button type="submit" id="submitBtn">Submit for Review</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbymAFhRRdHFV_1A28UFTwMaL7nfht_s4bkI0CYJTiJHPKPysJGaaVbqJtRZskfZbxMZ/exec'; // PASTE YOUR URL
        const form = document.getElementById('objectiveForm');
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Submitting...";
            
            let formData = new FormData();
            formData.append('objective', document.getElementById('objectiveText').value);

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => {
                    status.innerText = "Objective sent to the dashboard!";
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "Submit Another";
                })
                .catch(error => {
                    status.innerText = "Error submitting.";
                    status.style.color = "red";
                    btn.disabled = false;
                    btn.innerText = "Try Again";
                });
        });
    </script>
</body>
</html>
