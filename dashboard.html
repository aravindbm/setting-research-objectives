<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Protocol Triage</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #ecf0f1; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .card { background: #34495e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); font-size: 20px; line-height: 1.5; }
        .bad-verb { color: #e74c3c; font-weight: bold; text-decoration: underline; }
        .good-verb { color: #2ecc71; font-weight: bold; }
        .timestamp { font-size: 12px; color: #95a5a6; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <h1>Live Protocol Triage: SMART Check</h1>
    <div class="grid" id="dashboard">Loading incoming objectives...</div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbymAFhRRdHFV_1A28UFTwMaL7nfht_s4bkI0CYJTiJHPKPysJGaaVbqJtRZskfZbxMZ/exec'; // PASTE YOUR URL
        
        // The automated feedback dictionary
        const badVerbs = ['understand', 'know', 'appreciate', 'study', 'see', 'check', 'explore', 'believe', 'prove'];
        const goodVerbs = ['determine', 'compare', 'calculate', 'estimate', 'assess', 'identify', 'quantify'];

        function analyzeText(text) {
            let processedText = text;
            
            badVerbs.forEach(verb => {
                const regex = new RegExp(`\\b${verb}\\b`, 'gi');
                processedText = processedText.replace(regex, `<span class="bad-verb">$& (Avoid)</span>`);
            });

            goodVerbs.forEach(verb => {
                const regex = new RegExp(`\\b${verb}\\b`, 'gi');
                processedText = processedText.replace(regex, `<span class="good-verb">$& (Measurable)</span>`);
            });

            return processedText;
        }

        function fetchData() {
            fetch(scriptURL)
                .then(response => response.json())
                .then(data => {
                    const dashboard = document.getElementById('dashboard');
                    dashboard.innerHTML = '';
                    
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        const timeString = new Date(item.time).toLocaleTimeString();
                        const analyzedObjective = analyzeText(item.objective);
                        
                        card.innerHTML = `<span class="timestamp">Submitted: ${timeString}</span>${analyzedObjective}`;
                        dashboard.appendChild(card);
                    });
                })
                .catch(error => console.error('Error fetching data:', error));
        }

        // Fetch data immediately, then every 5 seconds
        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
